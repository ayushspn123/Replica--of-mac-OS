<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>macOS — Web Edition</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#63743;</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="apps.css">
</head>
<body>

<!-- ══════════ BOOT SCREEN ══════════ -->
<div id="boot">
  <svg id="boot-apple" viewBox="0 0 814 1000" width="74" height="90" fill="#f5f5f7">
    <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105.6-57-155.5-127C46.7 790.7 0 663 0 541.8c0-194.4 126.4-297.5 250.8-297.5 66.1 0 121.2 43.4 162.7 43.4 39.5 0 101.1-46 176.3-46 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/>
  </svg>
  <div id="boot-bar"><div id="boot-progress"></div></div>
</div>

<!-- ══════════ LOCK SCREEN ══════════ -->
<div id="lock" class="hidden">
  <div class="lock-wallpaper"></div>
  <div class="lock-content">
    <div class="lock-date" id="lock-date">Thursday, June 12</div>
    <div class="lock-clock" id="lock-clock">9:41</div>
  </div>
  <div class="lock-user">
    <div class="lock-avatar">AK</div>
    <div class="lock-name">Ayush Kumar</div>
    <input type="password" id="lock-pass" placeholder="Enter Password" autocomplete="off">
    <div class="lock-hint">Press Enter — any password works here</div>
  </div>
</div>

<!-- ══════════ DESKTOP ══════════ -->
<div id="os" class="hidden">
  <div id="wallpaper"></div>

  <!-- Menu bar -->
  <nav id="menubar">
    <div class="mb-left">
      <button class="mb-item mb-apple" data-menu="apple">
        <svg viewBox="0 0 814 1000" width="13" height="16" fill="currentColor"><path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105.6-57-155.5-127C46.7 790.7 0 663 0 541.8c0-194.4 126.4-297.5 250.8-297.5 66.1 0 121.2 43.4 162.7 43.4 39.5 0 101.1-46 176.3-46 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/></svg>
      </button>
      <span id="mb-menus"></span>
    </div>
    <div class="mb-right">
      <button class="mb-item mb-status" id="mb-battery" title="Battery">
        <span id="mb-battery-pct">100%</span>
        <svg viewBox="0 0 28 13" width="26" height="13"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" fill="none" stroke="currentColor" opacity=".5"/><rect id="mb-battery-fill" x="2" y="2" width="20" height="9" rx="2" fill="currentColor"/><path d="M25.5 4.5v4c1.2-.3 2-1.1 2-2s-.8-1.7-2-2z" fill="currentColor" opacity=".5"/></svg>
      </button>
      <button class="mb-item mb-status" id="mb-wifi" title="Wi-Fi">
        <svg viewBox="0 0 16 12" width="16" height="12" fill="currentColor"><path d="M8 9.6a1.6 1.6 0 1 1 0 3.2 1.6 1.6 0 0 1 0-3.2zM8 5.4c1.7 0 3.2.7 4.3 1.7l-1.4 1.5A4.1 4.1 0 0 0 8 7.4c-1.1 0-2.1.4-2.9 1.2L3.7 7.1A6.1 6.1 0 0 1 8 5.4zM8 1.2c2.8 0 5.4 1.1 7.3 2.9l-1.4 1.4A8.3 8.3 0 0 0 8 3.2c-2.3 0-4.4.9-5.9 2.3L.7 4.1A10.3 10.3 0 0 1 8 1.2z" transform="translate(0 -1)"/></svg>
      </button>
      <button class="mb-item mb-status" id="mb-spotlight" title="Spotlight (Ctrl+Space)">
        <svg viewBox="0 0 16 16" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="6.7" cy="6.7" r="5"/><path d="M10.5 10.5l4 4"/></svg>
      </button>
      <button class="mb-item mb-status" id="mb-cc" title="Control Centre">
        <svg viewBox="0 0 16 16" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="1" y="2.2" width="14" height="4.6" rx="2.3"/><circle cx="4.5" cy="4.5" r="1.5" fill="currentColor" stroke="none"/><rect x="1" y="9.2" width="14" height="4.6" rx="2.3"/><circle cx="11.5" cy="11.5" r="1.5" fill="currentColor" stroke="none"/></svg>
      </button>
      <button class="mb-item" id="mb-clock">Thu 12 Jun 9:41 AM</button>
    </div>
  </nav>

  <!-- Desktop widgets -->
  <div id="widgets">
    <div class="widget widget-clock">
      <div class="w-city">Gurugram</div>
      <div class="w-time" id="widget-time">9:41</div>
      <div class="w-date" id="widget-date">Thu, Jun 12</div>
    </div>
    <div class="widget widget-weather">
      <div class="w-city">Weather</div>
      <div class="w-temp">31°</div>
      <div class="w-cond">☀️ Sunny · H:38° L:27°</div>
    </div>
  </div>

  <div id="desktop-icons"></div>
  <div id="windows"></div>

  <!-- Dock -->
  <div id="dock-wrap"><div id="dock"></div></div>
</div>

<!-- ══════════ OVERLAYS ══════════ -->
<div id="spotlight" class="overlay hidden">
  <div class="spotlight-panel">
    <div class="spotlight-bar">
      <svg viewBox="0 0 16 16" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" opacity=".45"><circle cx="6.7" cy="6.7" r="5"/><path d="M10.5 10.5l4 4"/></svg>
      <input id="spotlight-input" type="text" placeholder="Spotlight Search" autocomplete="off" spellcheck="false">
    </div>
    <div id="spotlight-results"></div>
  </div>
</div>

<div id="launchpad" class="overlay hidden">
  <input id="lp-search" type="text" placeholder="Search" autocomplete="off" spellcheck="false">
  <div id="lp-grid"></div>
</div>

<div id="control-center" class="hidden"></div>
<div id="menu-dropdown" class="hidden"></div>
<div id="ctx-menu" class="hidden"></div>
<div id="notif-stack"></div>
<div id="dialog-root" class="hidden"></div>
<div id="brightness-overlay"></div>

<!-- Sleep / shutdown screens -->
<div id="power-screen" class="hidden">
  <button id="power-btn" class="hidden" title="Power on">
    <svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 3v8"/><path d="M6.3 6.5a8 8 0 1 0 11.4 0"/></svg>
  </button>
</div>

<div id="mobile-warning">
  <div>
    <div style="font-size:46px">💻</div>
    <h2>Best experienced on a laptop</h2>
    <p>This macOS experience needs a larger screen and a mouse or trackpad.</p>
  </div>
</div>

<script src="js/system.js"></script>
<script src="js/apps.js"></script>
<script src="js/main.js"></script>
</body>
</html>
